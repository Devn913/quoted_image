<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Image Gallery</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f0f0;
      color: #111;
    }

    /* ── Header ── */
    header {
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header svg {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.85rem;
      color: #777;
      margin-left: auto;
    }

    /* ── Gallery grid ── */
    /*
      Pinterest uniform grid: fixed-width columns, fixed-height rows.
      object-fit: cover keeps aspect ratios intact while filling each cell.
    */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      grid-auto-rows: 240px;        /* every row is the same fixed height */
      gap: 12px;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Individual card ── */
    .card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: zoom-in;
      background: #ddd;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.10);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      z-index: 1;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;       /* fills the cell perfectly, no empty space */
      display: block;
      transition: filter 0.25s ease;
    }

    .card:hover img {
      filter: brightness(0.88);
    }

    /* ── Overlay label on hover ── */
    .card .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 12px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .card:hover .overlay {
      opacity: 1;
    }

    .card .overlay span {
      color: #fff;
      font-size: 0.78rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
      object-fit: contain;
    }

    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 26px;
      font-size: 2rem;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }

    #lightbox-close:hover {
      opacity: 1;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 28px 16px;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <!-- Simple logo mark -->
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="32" height="32" rx="8" fill="#e60023"/>
      <path d="M16 6C10.477 6 6 10.477 6 16c0 4.236 2.636 7.855 6.356 9.312-.088-.791-.167-2.005.035-2.868.181-.78 1.207-5.11 1.207-5.11s-.308-.617-.308-1.53c0-1.433.832-2.505 1.866-2.505.88 0 1.307.661 1.307 1.454 0 .886-.564 2.213-.856 3.443-.243 1.028.514 1.865 1.524 1.865 1.829 0 3.236-1.928 3.236-4.71 0-2.463-1.77-4.184-4.298-4.184-2.927 0-4.645 2.195-4.645 4.464 0 .884.34 1.83.764 2.348a.307.307 0 0 1 .071.294c-.078.322-.25 1.028-.285 1.172-.046.19-.152.23-.35.138-1.249-.581-2.03-2.407-2.03-3.874 0-3.154 2.292-6.052 6.608-6.052 3.469 0 6.165 2.473 6.165 5.776 0 3.447-2.173 6.22-5.19 6.22-1.014 0-1.969-.527-2.295-1.148l-.623 2.326c-.226.869-.836 1.958-1.244 2.621.937.29 1.931.447 2.961.447 5.523 0 10-4.477 10-10S21.523 6 16 6Z" fill="white"/>
    </svg>
    <h1>AI Image Gallery</h1>
    <p>Quoted Image Collection</p>
  </header>

  <!-- Pinterest-style uniform grid -->
  <main class="gallery" id="gallery">

    <div class="card" data-src="generated_image/2020_12_19_17_20_18_230166.png">
      <img src="generated_image/2020_12_19_17_20_18_230166.png" alt="AI generated image 1" loading="lazy" />
      <div class="overlay"><span>AI Generated · 2020-12-19</span></div>
    </div>

    <div class="card" data-src="generated_image/2020_12_19_17_20_19_871550.png">
      <img src="generated_image/2020_12_19_17_20_19_871550.png" alt="AI generated image 2" loading="lazy" />
      <div class="overlay"><span>AI Generated · 2020-12-19</span></div>
    </div>

    <div class="card" data-src="generated_image/2020_12_19_17_36_34_938678.png">
      <img src="generated_image/2020_12_19_17_36_34_938678.png" alt="AI generated image 3" loading="lazy" />
      <div class="overlay"><span>AI Generated · 2020-12-19</span></div>
    </div>

    <div class="card" data-src="generated_image/2020_12_19_17_36_36_434885.png">
      <img src="generated_image/2020_12_19_17_36_36_434885.png" alt="AI generated image 4" loading="lazy" />
      <div class="overlay"><span>AI Generated · 2020-12-19</span></div>
    </div>

    <div class="card" data-src="generated_image/2020_12_19_17_36_39_752673.png">
      <img src="generated_image/2020_12_19_17_36_39_752673.png" alt="AI generated image 5" loading="lazy" />
      <div class="overlay"><span>AI Generated · 2020-12-19</span></div>
    </div>

    <div class="card" data-src="generated_image/2020_12_19_17_36_42_270400.png">
      <img src="generated_image/2020_12_19_17_36_42_270400.png" alt="AI generated image 6" loading="lazy" />
      <div class="overlay"><span>AI Generated · 2020-12-19</span></div>
    </div>

    <div class="card" data-src="generated_image/2020_12_19_17_36_44_973749.png">
      <img src="generated_image/2020_12_19_17_36_44_973749.png" alt="AI generated image 7" loading="lazy" />
      <div class="overlay"><span>AI Generated · 2020-12-19</span></div>
    </div>

  </main>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <button id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="Full-size preview" />
  </div>

  <footer>
    <p>Images generated with <a href="https://unsplash.com" target="_blank" rel="noopener">Unsplash</a> &amp; Python Pillow &mdash; Quoted Image Project</p>
  </footer>

  <script>
    // Open lightbox on card click
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    document.getElementById('gallery').addEventListener('click', function (e) {
      const card = e.target.closest('.card');
      if (!card) return;
      lightboxImg.src = card.dataset.src;
      lightboxImg.alt = card.querySelector('img').alt;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    });

    // Close lightbox
    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
